<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ m.judul }} - TKJ Smart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='baca_modul.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .reading-container { max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.8; }
        .materi-header { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .materi-content { font-size: 1.1rem; color: #333; }
        .materi-content img { max-width: 100%; border-radius: 10px; margin: 20px 0; }
        .btn-back { display: inline-block; margin-bottom: 20px; color: #4875ff; text-decoration: none; }
        /* Style untuk kode perintah terminal */
        pre { background: #2d3436; color: #fab1a0; padding: 15px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
	<div style="position:fixed; top:0; left:0; width:100%; height:5px; background:#ddd; z-index:9999;">
		<div id="progressBar" style="height:5px; width:0%; background:#4875ff;"></div>
	</div>
    <div class="reading-container">
        <a href="/modul/{{m.kategori}}" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
        
        <article class="materi-body">
            <header class="materi-header">
                <span style="color: #4875ff; font-weight: bold; text-transform: uppercase;">{{ m.kategori }}</span>
                <h1 style="font-size: 2.5rem; margin: 10px 0;">{{ m.judul }}</h1>
            </header>

            <div class="materi-content">
                {{ m.konten | safe }}
            </div>
        </article>

        <hr style="margin: 50px 0; border: 0; border-top: 1px solid #eee;">
        
        <h3>Materi Terkait Lainnya:</h3>
        <div class="rekomendasi-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
            {% for r in rekomendasi %}
            <a href="/modul/baca/{{ r.id }}" style="text-decoration: none; color: inherit;">
                <div style="padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
                    <h4 style="margin: 0;">{{ r.judul }}</h4>
                </div>
            </a>
            {% endfor %}
        </div>
        <div style="text-align:center; margin-top:50px;">
			<button onclick="selesaiBelajar()" 
				style="padding:15px 30px; background:#2ecc71; color:white; border:none; border-radius:10px; font-size:16px;">
					Tandai Selesai
			</button>
		</div>
    </div>
    <script>
	let lastSent = 0;

	window.addEventListener("scroll", function () {

		let scrollTop = document.documentElement.scrollTop;
		let scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;

		let progress = Math.round((scrollTop / scrollHeight) * 100);

		// 🔥 update progress bar
		document.getElementById("progressBar").style.width = progress + "%";

		// 🔥 kirim ke backend tiap naik 10%
		if (progress - lastSent >= 10) {
			lastSent = progress;

			fetch("/update-progress", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					modul_id: {{ m.id }},
					progress: progress
				})
			})
			.catch(err => console.log("Progress error:", err));
		}
	});
	</script>
	<script>
	function selesaiBelajar() {
		fetch("/update-progress", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({
				modul_id: {{ m.id }},
				progress: 100
			})
		})
		.then(res => res.json())
		.then(res => {
			alert("🎉 Modul selesai!");
			window.location.href = "/modul/{{m.kategori}}";
		})
		.catch(() => alert("Terjadi error!"));
	}
	</script>
</body>
</html>
